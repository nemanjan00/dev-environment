name: Build

on:
  push:
    branches: [master]

concurrency:
  group: build
  cancel-in-progress: false

env:
  IMAGE: nemanjan00/dev

jobs:
  base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u nemanjan00 --password-stdin
      - name: Build and push base
        run: |
          docker build -t $IMAGE:base .
          docker push $IMAGE:base

  profile:
    needs: base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [default, android, embedded, librarian, maker, reversing, scraper]
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u nemanjan00 --password-stdin
      - name: Build and push profile
        run: |
          docker build -t $IMAGE:${{ matrix.profile }} profiles/${{ matrix.profile }}
          docker push $IMAGE:${{ matrix.profile }}

  analyst:
    needs: profile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u nemanjan00 --password-stdin
      - name: Build and push analyst
        run: |
          docker build -t $IMAGE:analyst profiles/analyst
          docker push $IMAGE:analyst
